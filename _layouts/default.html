<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ page.url | absolute_url }}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "{{ page.title | default: site.title }}",
      "description": "{{ page.description | default: site.description }}",
      "inLanguage": "zh-CN",
      "isPartOf": {
        "@type": "WebSite",
        "name": "{{ site.title }}",
        "url": "{{ site.url }}{{ site.baseurl }}/"
      }
    }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ site.baseurl }}/">轻量网络访问指南</a>
      <nav aria-label="主导航">
        <a href="{{ site.baseurl }}/">首页</a>
        <a href="{{ site.baseurl }}/guide/vpn-network-accelerator/">VPN与加速器</a>
        <a href="{{ site.baseurl }}/guide/streaming-game-remote-work/">使用场景</a>
        <a href="https://www.juechenjsq.com/" rel="nofollow sponsored">绝尘加速器官网</a>
      </nav>
    </header>

    <main class="page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>本站整理 VPN、网络加速和访问体验优化相关知识。请根据所在地法律法规、平台规则和个人实际需求合规使用相关工具。</p>
    </footer>
  </body>
</html>
